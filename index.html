<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Naama Ceramics</title>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #faf8f5;
      --text: #2c2825;
      --muted: #8c8078;
      --accent: #b5785a;
      --card-bg: #ffffff;
      --border: #e8e2da;
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: ltr; /* default LTR, Hebrew elements override */
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
      direction: ltr;
    }

    #logo-wrap {
      cursor: pointer;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    #site-logo {
      height: 52px;
      max-width: 160px;
      object-fit: contain;
      display: none;
    }
    #header-name { display: none; }
    #header-home-text {
      font-family: 'Georgia', serif;
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: 0.07em;
      color: var(--text);
      white-space: nowrap;
      transition: color 0.2s;
    }
    #logo-wrap:hover #header-home-text { color: var(--accent); }

    /* ── SHOP DROPDOWN ── */
    .shop-dropdown { position: relative; }

    .shop-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      font-family: 'Assistant', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      direction: rtl;
    }
    .shop-btn:hover { background: #9e6449; }
    .shop-btn svg { width: 14px; height: 14px; transition: transform 0.2s; flex-shrink: 0; }
    .shop-btn.open svg { transform: rotate(180deg); }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      left: auto;
      background: white;
      border: 1px solid var(--border);
      border-radius: 4px;
      min-width: 180px;
      max-width: calc(100vw - 32px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.12);
      z-index: 200;
      overflow: hidden;
      direction: rtl;
    }
    .dropdown-menu.open { display: block; }
    .dropdown-menu button {
      display: block;
      width: 100%;
      padding: 13px 20px;
      text-align: right;
      border: none;
      background: transparent;
      font-family: 'Assistant', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
    }
    .dropdown-menu button:last-child { border-bottom: none; }
    .dropdown-menu button:hover { background: var(--bg); color: var(--accent); }
    .dropdown-menu button.active { color: var(--accent); font-weight: 600; background: #fff5f0; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      background: var(--bg);
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    #footer-credit {
      font-family: 'Assistant', sans-serif;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .footer-social {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .footer-social a,
    #lightbox-actions a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      text-decoration: none;
      transition: all 0.2s;
    }
    .icon-whatsapp, .icon-instagram, .icon-email {
      background: transparent;
      border: none;
    }
    .icon-whatsapp:hover, .icon-instagram:hover, .icon-email:hover {
      opacity: 0.85;
      transform: scale(1.08);
    }

    /* ── MAIN ── */
    main { max-width: 1100px; margin: 0 auto; padding: 48px 24px 0; }

    /* ── SPLASH ── */
    #splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 55vh;
      gap: 24px;
      text-align: center;
      padding-top: 40px;
    }
    #splash-logo {
      max-width: min(420px, 85vw);
      max-height: 220px;
      object-fit: contain;
      display: none;
    }
    #splash-text-img {
      width: 50vw;
      height: auto;
      object-fit: contain;
      display: none;
    }
    @media (max-width: 768px) {
      #splash-text-img {
        width: 100vw;
      }
    }
    #splash-soon {
      font-family: 'Assistant', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--muted);
      display: none;
    }

    /* ── SHOP VIEW ── */
    #shop-view { display: none; padding-bottom: 80px; }

    .view-title {
      font-family: 'Assistant', sans-serif;
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--text);
      margin-bottom: 32px;
      text-align: right;
      direction: rtl;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .view-title::after {
      content: '';
      position: absolute;
      bottom: -1px;
      right: 0;
      width: 48px;
      height: 2px;
      background: var(--accent);
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 28px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      transition: box-shadow 0.25s, transform 0.25s;
      cursor: pointer;
      direction: rtl;
    }
    .card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.09); transform: translateY(-3px); }
    .card.is-sold { opacity: 0.72; }

    .card-img-wrap { position: relative; }
    .card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: var(--border); }

    .stock-pill {
      font-family: 'Assistant', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      padding: 3px 8px;
      border-radius: 20px;
      display: inline-block;
    }
    .stock-1    { background: rgba(255,255,255,0.93); color: #b55a5a; border: 1px solid #e8c0b0; }
    .stock-2    { background: rgba(255,255,255,0.93); color: #8a6820; border: 1px solid #e0d080; }
    .stock-3    { background: rgba(255,255,255,0.93); color: #4a7a4a; border: 1px solid #a0c8a0; }
    .stock-4    { background: rgba(255,255,255,0.93); color: #3a6a8a; border: 1px solid #90b8d0; }
    .stock-sold { background: rgba(44,40,37,0.72);   color: #e8e2da; border: 1px solid transparent; }

    .card-body  { padding: 14px 16px 16px; text-align: right; }
    .card-name  { font-family: 'Assistant', sans-serif; font-size: 1rem; font-weight: 400; color: var(--text); margin-bottom: 8px; }
    .card-bottom { display: flex; align-items: center; justify-content: space-between; flex-direction: row-reverse; gap: 6px; }
    .card-price { font-family: 'Assistant', sans-serif; font-size: 0.85rem; color: var(--accent); font-weight: 300; }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(30,26,22,0.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #lightbox.open { display: flex; }
    #lightbox-inner { background: white; border-radius: 4px; max-width: 680px; width: 100%; overflow: hidden; direction: rtl; }
    #lightbox-img   { width: 100%; max-height: 65vh; object-fit: contain; background: var(--bg); display: block; }
    #lightbox-info  { padding: 20px 24px 24px; display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; direction: rtl; }
    #lightbox-contact-label { font-family: 'Assistant', sans-serif; font-size: 0.82rem; color: var(--muted); margin-bottom: 8px; text-align: center; }
    #lightbox-name   { font-family: 'Assistant', sans-serif; font-size: 1.2rem; font-weight: 600; }
    #lightbox-price  { font-family: 'Assistant', sans-serif; font-size: 1rem; color: var(--accent); margin-top: 4px; }
    #lightbox-status { font-family: 'Assistant', sans-serif; font-size: 0.85rem; margin-top: 5px; }
    #lightbox-close  { position: absolute; top: 16px; left: 20px; font-size: 1.8rem; color: white; cursor: pointer; line-height: 1; background: none; border: none; }

    .state-msg {
      grid-column: 1/-1;
      text-align: center;
      color: var(--muted);
      font-family: 'Assistant', sans-serif;
      padding: 60px 0;
      font-size: 1rem;
    }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      header { padding: 10px 16px; }
      #site-logo { height: 38px; max-width: 120px; }
      .shop-btn { padding: 9px 16px; font-size: 0.92rem; }
      footer { padding: 16px 20px; }
    }
  </style>
</head>

<script>
// ── Setup ─────────────────────────────────────────────────────────────────
document.getElementById('footer-mail').href      = 'mailto:' + CONFIG.contactEmail;
document.getElementById('footer-credit').textContent = '© ' + CONFIG.artistName;

// ── Stock metadata ────────────────────────────────────────────────────────
const STOCK_META = {
  "1":    { label: "יחידה בודדת", pillClass: "stock-1"   },
  "2":    { label: "2 יחידות",    pillClass: "stock-2"   },
  "3":    { label: "3 יחידות",    pillClass: "stock-3"   },
  "4":    { label: "4 יחידות",    pillClass: "stock-4"   },
  "sold": { label: "נמכר",        pillClass: "stock-sold" },
};

function stockStatusText(units) {
  if (units === 'sold') return 'נמכר — לא זמין יותר';
  return units === '1' ? 'פריט אחד זמין' : `${units} פריטים זמינים`;
}

// ── Parse filename: "name_price_tag.jpg" ─────────────────────────────────
function parseFilename(rawName) {
  const noExt = rawName.replace(/\.[^/.]+$/, '');
  const parts = noExt.split('_');
  const name  = (parts[0] || '').replace(/-/g, ' ').trim();
  const price = parts[1] !== undefined && !isNaN(Number(parts[1]))
                 ? Number(parts[1]) : 'N/A';
  const tag   = parts[2] ? parts[2].trim().toLowerCase() : 'other';
  return { name, price, tag };
}

// ── Fetch images from Drive folder ───────────────────────────────────────
async function fetchDriveImages(folderId) {
  const url = `https://www.googleapis.com/drive/v3/files`
    + `?q=%27${folderId}%27+in+parents+and+mimeType+contains+%27image/%27`
    + `&fields=files(id,name)&key=${CONFIG.apiKey}`;
  const res  = await fetch(url);
  const data = await res.json();
  return data.files || [];
}

// ── All items cache ───────────────────────────────────────────────────────
let allItems = [];

async function loadAllItems() {
  const [f1, f2, f3, f4, fSold] = await Promise.all([
    fetchDriveImages(CONFIG.folderIds["1"]),
    fetchDriveImages(CONFIG.folderIds["2"]),
    fetchDriveImages(CONFIG.folderIds["3"]),
    fetchDriveImages(CONFIG.folderIds["4"]),
    fetchDriveImages(CONFIG.folderIds["sold"]),
  ]);
  const map = (files, units) => files.map(f => {
    const { name, price, tag } = parseFilename(f.name);
    return { name, price, tag, units, img: `https://drive.google.com/thumbnail?id=${f.id}&sz=w800` };
  });
  allItems = [
    ...map(f1,"1"), ...map(f2,"2"),
    ...map(f3,"3"), ...map(f4,"4"),
    ...map(fSold,"sold"),
  ];
  buildDropdown();
}

// ── Build dropdown ────────────────────────────────────────────────────────
function buildDropdown() {
  const tags = [...new Set(allItems.map(i => i.tag))].sort();
  const menu = document.getElementById('dropdown-menu');
  menu.innerHTML = '';
  tags.forEach(tag => {
    const btn = document.createElement('button');
    btn.textContent = tag.charAt(0).toUpperCase() + tag.slice(1);
    btn.dataset.tag = tag;
    btn.onclick = () => showTag(tag);
    menu.appendChild(btn);
  });
}

// ── Toggle dropdown ───────────────────────────────────────────────────────
function toggleShopMenu() {
  document.getElementById('shop-btn').classList.toggle('open');
  document.getElementById('dropdown-menu').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!document.getElementById('shop-dropdown').contains(e.target)) {
    document.getElementById('shop-btn').classList.remove('open');
    document.getElementById('dropdown-menu').classList.remove('open');
  }
});

// ── Show splash ───────────────────────────────────────────────────────────
function showSplash() {
  document.getElementById('splash').style.display    = 'flex';
  document.getElementById('shop-view').style.display = 'none';
  document.querySelectorAll('.dropdown-menu button').forEach(b => b.classList.remove('active'));
  document.getElementById('shop-btn').classList.remove('open');
  document.getElementById('dropdown-menu').classList.remove('open');
}

// ── Show tag ──────────────────────────────────────────────────────────────
function showTag(tag) {
  document.getElementById('shop-btn').classList.remove('open');
  document.getElementById('dropdown-menu').classList.remove('open');
  document.querySelectorAll('.dropdown-menu button').forEach(b =>
    b.classList.toggle('active', b.dataset.tag === tag)
  );
  const available = allItems.filter(i => i.tag === tag && i.units !== 'sold');
  const sold      = allItems.filter(i => i.tag === tag && i.units === 'sold');
  const items     = [...available, ...sold];

  document.getElementById('view-title').textContent =
    tag.charAt(0).toUpperCase() + tag.slice(1);
  const grid = document.getElementById('shop-grid');
  grid.innerHTML = '';
  if (!items.length) {
    grid.innerHTML = `<p class="state-msg">אין פריטים כאן עדיין.</p>`;
  } else {
    items.forEach(item => grid.appendChild(makeCard(item)));
  }
  document.getElementById('splash').style.display    = 'none';
  document.getElementById('shop-view').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Make card ─────────────────────────────────────────────────────────────
function makeCard({ name, img, units, price }) {
  const meta         = STOCK_META[units];
  const priceDisplay = price === 'N/A' ? '' : `₪${price}`;
  const card         = document.createElement('div');
  card.className     = 'card' + (units === 'sold' ? ' is-sold' : '');
  card.innerHTML     = `
    <div class="card-img-wrap">
      <img src="${img}" alt="${name}" loading="lazy"/>
    </div>
    <div class="card-body">
      <div class="card-name">${name}</div>
      <div class="card-bottom">
        ${priceDisplay ? `<div class="card-price">${priceDisplay}</div>` : '<div></div>'}
        <span class="stock-pill ${meta.pillClass}">${meta.label}</span>
      </div>
    </div>`;
  card.addEventListener('click', () => openLightbox({ name, img, units, price }));
  return card;
}

// ── Lightbox ──────────────────────────────────────────────────────────────
function openLightbox({ name, img, units, price }) {
  document.getElementById('lightbox-img').src           = img;
  document.getElementById('lightbox-name').textContent  = name;
  document.getElementById('lightbox-price').textContent = price === 'N/A' ? '' : `₪${price}`;
  const statusEl = document.getElementById('lightbox-status');
  statusEl.textContent = stockStatusText(units);
  statusEl.style.color = units === 'sold' ? '#7a4a4a' : '#4a7a4a';
  const actions = document.getElementById('lightbox-actions');
  if (units !== 'sold') {
    actions.style.display = 'flex';
    document.getElementById('lightbox-whatsapp').href =
      `https://wa.me/972526175449?text=${encodeURIComponent("היי! ראיתי את המוצר " + name + " באתר ואני אשמח לקבל יותר פרטים לגביו")}`;
  } else {
    actions.style.display = 'none';
  }
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  if (e && e.target !== document.getElementById('lightbox') &&
           e.target !== document.getElementById('lightbox-close')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

// ── Load logo folder (Logo + Text images) ────────────────────────────────
async function loadLogoFolder() {
  try {
    const files = await fetchDriveImages(CONFIG.logoFolderId);

    // Splash + header logo — file named "Logo"
    const logoFile = files.find(f =>
      f.name.replace(/\.[^/.]+$/, '').toLowerCase() === 'logo'
    );
    if (logoFile) {
      const logoUrl = `https://drive.google.com/thumbnail?id=${logoFile.id}&sz=w800`;
      const sl = document.getElementById('splash-logo');
      if (sl) { sl.src = logoUrl; sl.style.display = 'block'; }
    }

    // Splash text image — file named "Text"
    const textFile = files.find(f =>
      f.name.replace(/\.[^/.]+$/, '').toLowerCase() === 'text'
    );
    if (textFile) {
      const tl = document.getElementById('splash-text-img');
      tl.src = `https://drive.google.com/thumbnail?id=${textFile.id}&sz=w1200`;
      tl.style.display = 'block';
    } else {
      document.getElementById('splash-soon').style.display = 'block';
    }

    // Contact icons — WA, IG, Mail images from logo folder
    const waFile   = files.find(f => f.name.replace(/\.[^/.]+$/, '').toLowerCase() === 'wa');
    const igFile   = files.find(f => f.name.replace(/\.[^/.]+$/, '').toLowerCase() === 'ig');
    const mailFile = files.find(f => f.name.replace(/\.[^/.]+$/, '').toLowerCase() === 'mail');

    function setIconSrc(ids, fileObj) {
      if (!fileObj) return;
      const src = `https://drive.google.com/thumbnail?id=${fileObj.id}&sz=w100`;
      ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.innerHTML = `<img src="${src}" style="width:36px;height:36px;border-radius:8px;object-fit:cover;" alt=""/>`;
        }
      });
    }
    setIconSrc(['footer-wa',   'lightbox-whatsapp'], waFile);
    setIconSrc(['footer-ig',   'lightbox-instagram'], igFile);
    setIconSrc(['footer-mail'],                       mailFile);

  } catch(e) {
    document.getElementById('header-name').style.display  = 'block';
    document.getElementById('splash-soon').style.display  = 'block';
  }
}

// ── Init ──────────────────────────────────────────────────────────────────
async function init() {
  showSplash();
  await Promise.all([loadLogoFolder(), loadAllItems()]);
}
init();
</script>
