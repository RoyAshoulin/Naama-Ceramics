<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Naama Ceramics</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #faf8f5;
      --text: #2c2825;
      --muted: #8c8078;
      --accent: #b5785a;
      --card-bg: #ffffff;
      --border: #e8e2da;
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    #logo-wrap {
      cursor: pointer;
      display: flex;
      align-items: center;
    }
    #site-logo {
      height: 56px;
      max-width: 180px;
      object-fit: contain;
      display: none;
    }
    #header-name {
      font-size: 1.3rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      display: none;
    }

    /* ── SHOP DROPDOWN ── */
    #main-nav { display: flex; align-items: center; gap: 8px; }

    .shop-dropdown { position: relative; }
    .shop-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: transparent;
      font-family: sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }
    .shop-btn:hover, .shop-btn.open { border-color: var(--accent); color: var(--accent); }
    .shop-btn svg { width: 12px; height: 12px; transition: transform 0.2s; }
    .shop-btn.open svg { transform: rotate(180deg); }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: white;
      border: 1px solid var(--border);
      border-radius: 3px;
      min-width: 160px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      z-index: 200;
      overflow: hidden;
    }
    .dropdown-menu.open { display: block; }
    .dropdown-menu button {
      display: block;
      width: 100%;
      padding: 11px 18px;
      text-align: left;
      border: none;
      background: transparent;
      font-family: sans-serif;
      font-size: 0.83rem;
      letter-spacing: 0.05em;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s;
      text-transform: capitalize;
    }
    .dropdown-menu button:hover { background: var(--bg); }
    .dropdown-menu button.active { color: var(--accent); font-weight: 600; }

    /* ── SOCIAL ICONS ── */
    .social-links { display: flex; align-items: center; gap: 10px; }
    .social-links a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--muted);
      text-decoration: none;
      transition: all 0.2s;
    }
    .social-links a:hover { border-color: var(--accent); color: var(--accent); background: #fff5f0; }
    .social-links svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    /* ── MAIN ── */
    main { max-width: 1100px; margin: 0 auto; padding: 48px 24px 80px; }

    /* ── SPLASH ── */
    #splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
    }
    #splash-img {
      max-width: 90%;
      max-height: 65vh;
      object-fit: contain;
      display: none;
    }
    #splash-text {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-style: italic;
      display: none;
    }

    /* ── SHOP VIEW ── */
    #shop-view { display: none; }

    .view-title {
      font-size: 0.75rem;
      font-family: sans-serif;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .view-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 28px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      transition: box-shadow 0.25s, transform 0.25s;
      cursor: pointer;
    }
    .card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.09); transform: translateY(-3px); }
    .card.is-sold { opacity: 0.72; }

    .card-img-wrap { position: relative; }
    .card img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      background: var(--border);
    }

    .stock-pill {
      position: absolute;
      top: 10px; right: 10px;
      font-family: sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 9px;
      border-radius: 20px;
    }
    .stock-1    { background: rgba(255,255,255,0.93); color: #b55a5a; border: 1px solid #e8c0b0; }
    .stock-2    { background: rgba(255,255,255,0.93); color: #8a6820; border: 1px solid #e0d080; }
    .stock-3    { background: rgba(255,255,255,0.93); color: #4a7a4a; border: 1px solid #a0c8a0; }
    .stock-4    { background: rgba(255,255,255,0.93); color: #3a6a8a; border: 1px solid #90b8d0; }
    .stock-sold { background: rgba(44,40,37,0.72);   color: #e8e2da; border: 1px solid transparent; }

    .card-body  { padding: 14px 16px 16px; }
    .card-name  { font-size: 0.95rem; color: var(--text); }
    .card-price { font-family: sans-serif; font-size: 0.82rem; color: var(--accent); margin-top: 4px; }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(30,26,22,0.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #lightbox.open { display: flex; }
    #lightbox-inner { background: white; border-radius: 4px; max-width: 680px; width: 100%; overflow: hidden; }
    #lightbox-img { width: 100%; max-height: 65vh; object-fit: contain; background: var(--bg); display: block; }
    #lightbox-info { padding: 20px 24px 24px; display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
    #lightbox-name   { font-size: 1.15rem; }
    #lightbox-price  { font-family: sans-serif; font-size: 1rem; color: var(--accent); margin-top: 4px; }
    #lightbox-status { font-family: sans-serif; font-size: 0.82rem; margin-top: 4px; }
    #lightbox-close  { position: absolute; top: 16px; right: 20px; font-size: 1.8rem; color: white; cursor: pointer; line-height: 1; background: none; border: none; }

    .state-msg {
      grid-column: 1/-1;
      text-align: center;
      color: var(--muted);
      font-style: italic;
      padding: 60px 0;
      font-size: 1rem;
    }

    /* ── FOOTER ── */
    footer { text-align: center; padding: 32px; border-top: 1px solid var(--border); color: var(--muted); font-family: sans-serif; font-size: 0.78rem; letter-spacing: 0.05em; }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      #site-logo { height: 40px; max-width: 130px; }
      .shop-btn { padding: 8px 12px; font-size: 0.78rem; }
      .social-links a { width: 32px; height: 32px; }
      .social-links svg { width: 14px; height: 14px; }
    }
  </style>
</head>

<script>
// ── Setup ─────────────────────────────────────────────────────────────────
document.getElementById('header-contact').href      = 'mailto:' + CONFIG.contactEmail;
document.getElementById('footer-credit').textContent = '© ' + CONFIG.artistName;

// ── Stock metadata ────────────────────────────────────────────────────────
const STOCK_META = {
  "1":    { label: "1 left",  pillClass: "stock-1"   },
  "2":    { label: "2 left",  pillClass: "stock-2"   },
  "3":    { label: "3 left",  pillClass: "stock-3"   },
  "4":    { label: "4 left",  pillClass: "stock-4"   },
  "sold": { label: "Sold",    pillClass: "stock-sold" },
};

function stockStatusText(units) {
  if (units === 'sold') return 'Sold — no longer available';
  return units === '1' ? '1 unit available' : `${units} units available`;
}

// ── Parse filename: "name_price_tag.jpg" ─────────────────────────────────
function parseFilename(rawName) {
  const noExt  = rawName.replace(/\.[^/.]+$/, '');
  const parts  = noExt.split('_');
  const name   = (parts[0] || '').replace(/-/g, ' ').trim();
  const price  = parts[1] !== undefined && !isNaN(Number(parts[1]))
                  ? Number(parts[1]) : 'N/A';
  const tag    = parts[2] ? parts[2].trim().toLowerCase() : 'other';
  return { name, price, tag };
}

// ── Fetch images from one Drive folder ───────────────────────────────────
async function fetchDriveImages(folderId) {
  const url = `https://www.googleapis.com/drive/v3/files`
    + `?q=%27${folderId}%27+in+parents+and+mimeType+contains+%27image/%27`
    + `&fields=files(id,name)&key=${CONFIG.apiKey}`;
  const res  = await fetch(url);
  const data = await res.json();
  return data.files || [];
}

// ── All items cache ───────────────────────────────────────────────────────
let allItems = [];

async function loadAllItems() {
  const [f1, f2, f3, f4, fSold] = await Promise.all([
    fetchDriveImages(CONFIG.folderIds["1"]),
    fetchDriveImages(CONFIG.folderIds["2"]),
    fetchDriveImages(CONFIG.folderIds["3"]),
    fetchDriveImages(CONFIG.folderIds["4"]),
    fetchDriveImages(CONFIG.folderIds["sold"]),
  ]);

  const map = (files, units) => files.map(f => {
    const { name, price, tag } = parseFilename(f.name);
    return { name, price, tag, units, img: `https://drive.google.com/thumbnail?id=${f.id}&sz=w800` };
  });

  allItems = [
    ...map(f1, "1"), ...map(f2, "2"),
    ...map(f3, "3"), ...map(f4, "4"),
    ...map(fSold, "sold"),
  ];

  buildDropdown();
}

// ── Build dropdown from unique tags ──────────────────────────────────────
function buildDropdown() {
  const tags = [...new Set(allItems.map(i => i.tag))].sort();
  const menu = document.getElementById('dropdown-menu');
  menu.innerHTML = '';
  tags.forEach(tag => {
    const btn = document.createElement('button');
    btn.textContent = tag.charAt(0).toUpperCase() + tag.slice(1);
    btn.dataset.tag = tag;
    btn.onclick = () => showTag(tag);
    menu.appendChild(btn);
  });
}

// ── Toggle shop menu ──────────────────────────────────────────────────────
function toggleShopMenu() {
  document.getElementById('shop-btn').classList.toggle('open');
  document.getElementById('dropdown-menu').classList.toggle('open');
}

document.addEventListener('click', e => {
  if (!document.getElementById('shop-dropdown').contains(e.target)) {
    document.getElementById('shop-btn').classList.remove('open');
    document.getElementById('dropdown-menu').classList.remove('open');
  }
});

// ── Show splash ───────────────────────────────────────────────────────────
function showSplash() {
  document.getElementById('splash').style.display    = 'flex';
  document.getElementById('shop-view').style.display = 'none';
  document.querySelectorAll('.dropdown-menu button').forEach(b => b.classList.remove('active'));
  document.getElementById('shop-btn').classList.remove('open');
  document.getElementById('dropdown-menu').classList.remove('open');
}

// ── Show tag ──────────────────────────────────────────────────────────────
function showTag(tag) {
  document.getElementById('shop-btn').classList.remove('open');
  document.getElementById('dropdown-menu').classList.remove('open');

  document.querySelectorAll('.dropdown-menu button').forEach(b =>
    b.classList.toggle('active', b.dataset.tag === tag)
  );

  const available = allItems.filter(i => i.tag === tag && i.units !== 'sold');
  const sold      = allItems.filter(i => i.tag === tag && i.units === 'sold');
  const items     = [...available, ...sold];

  document.getElementById('view-title').textContent =
    tag.charAt(0).toUpperCase() + tag.slice(1);

  const grid = document.getElementById('shop-grid');
  grid.innerHTML = '';
  if (!items.length) {
    grid.innerHTML = `<p class="state-msg">Nothing here yet.</p>`;
  } else {
    items.forEach(item => grid.appendChild(makeCard(item)));
  }

  document.getElementById('splash').style.display    = 'none';
  document.getElementById('shop-view').style.display = 'block';
}

// ── Make card ─────────────────────────────────────────────────────────────
function makeCard({ name, img, units, price }) {
  const meta         = STOCK_META[units];
  const priceDisplay = price === 'N/A' ? 'N/A' : `₪${price}`;
  const card         = document.createElement('div');
  card.className     = 'card' + (units === 'sold' ? ' is-sold' : '');
  card.innerHTML     = `
    <div class="card-img-wrap">
      <img src="${img}" alt="${name}" loading="lazy"/>
      <span class="stock-pill ${meta.pillClass}">${meta.label}</span>
    </div>
    <div class="card-body">
      <div class="card-name">${name}</div>
      <div class="card-price">${priceDisplay}</div>
    </div>`;
  card.addEventListener('click', () => openLightbox({ name, img, units, price }));
  return card;
}

// ── Lightbox ──────────────────────────────────────────────────────────────
function openLightbox({ name, img, units, price }) {
  document.getElementById('lightbox-img').src            = img;
  document.getElementById('lightbox-name').textContent   = name;
  document.getElementById('lightbox-price').textContent  = price === 'N/A' ? 'מחיר: N/A' : `₪${price}`;

  const statusEl = document.getElementById('lightbox-status');
  statusEl.textContent = stockStatusText(units);
  statusEl.style.color = units === 'sold' ? '#7a4a4a' : '#4a7a4a';

  const actions = document.getElementById('lightbox-actions');
  if (units !== 'sold') {
    actions.style.display = 'flex';
    document.getElementById('lightbox-whatsapp').href =
      `https://wa.me/972526175449?text=${encodeURIComponent("היי! ראיתי את המוצר " + name + " באתר ואני אשמח לקבל יותר פרטים לגביו")}`;
    document.getElementById('lightbox-email').href =
      `mailto:${CONFIG.contactEmail}?subject=${encodeURIComponent("פרטים על " + name)}&body=${encodeURIComponent("היי! ראיתי את המוצר " + name + " באתר ואני אשמח לקבל יותר פרטים לגביו")}`;
  } else {
    actions.style.display = 'none';
  }
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(e) {
  if (e && e.target !== document.getElementById('lightbox') &&
           e.target !== document.getElementById('lightbox-close')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

// ── Load logo ─────────────────────────────────────────────────────────────
async function loadLogo() {
  try {
    const files = await fetchDriveImages(CONFIG.logoFolderId);
    // Use first image in the logo folder that is NOT named "Text"
    const logoFile = files.find(f => f.name.replace(/\.[^/.]+$/, '').toLowerCase() !== 'text');
    if (logoFile) {
      const el = document.getElementById('site-logo');
      el.src = `https://drive.google.com/thumbnail?id=${logoFile.id}&sz=w400`;
      el.style.display = 'block';
    } else {
      document.getElementById('header-name').style.display = 'block';
    }
  } catch(e) {
    document.getElementById('header-name').style.display = 'block';
  }
}

// ── Load splash image ─────────────────────────────────────────────────────
async function loadSplash() {
  try {
    const files    = await fetchDriveImages(CONFIG.splashFolderId);
    const textFile = files.find(f => f.name.replace(/\.[^/.]+$/, '').toLowerCase() === 'text');
    if (textFile) {
      const el = document.getElementById('splash-img');
      el.src = `https://drive.google.com/thumbnail?id=${textFile.id}&sz=w1200`;
      el.style.display = 'block';
    } else {
      document.getElementById('splash-text').style.display = 'block';
    }
  } catch(e) {
    document.getElementById('splash-text').style.display = 'block';
  }
}

// ── Init ──────────────────────────────────────────────────────────────────
async function init() {
  showSplash();
  await Promise.all([loadLogo(), loadSplash(), loadAllItems()]);
}

init();
</script>
